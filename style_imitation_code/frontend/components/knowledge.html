<div v-if="activeTab === 'knowledge'" class="flex-1 flex flex-col p-4 overflow-hidden space-y-3">
    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 shrink-0">
        <div class="flex items-center gap-2 mb-3">
            <label class="text-xs text-gray-500 w-16">目标项目:</label>
            <select v-model="kbProject" @change="fetchKbFilesList" class="flex-1 text-sm bg-gray-50 border border-gray-200 rounded p-1.5 outline-none">
                <option value="">-- 选择项目 --</option>
                <optgroup label="小说项目 (novel_projects)">
                    <option v-for="p in projects" :value="p">{{ p }}</option>
                </optgroup>
                <optgroup label="风格模仿项目 (text_style_imitation)">
                    <option v-for="s in availableStyles" :value="'style@@' + s">{{ s }}</option>
                </optgroup>
            </select>
        </div>
        
        <div class="flex items-center gap-2 mb-3">
            <label class="text-xs text-gray-500 w-16">类型:</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="kbType" value="settings" @change="fetchKbFilesList"> 基础设定</label>
                <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="kbType" value="characters" @change="fetchKbFilesList"> 角色卡片</label>
                <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="kbType" value="outlines" @change="fetchKbFilesList"> 章节大纲</label>
                <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="kbType" value="prompts" @change="fetchKbFilesList"> Prompt指令</label>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-500 w-16">选择文件:</label>
            <select v-model="kbSelectedFile" @change="fetchKbContent" class="flex-1 text-sm bg-gray-50 border border-gray-200 rounded p-1.5 outline-none" :disabled="!kbProject">
                <option value="">-- 请选择需修改的数据 --</option>
                <option v-for="item in kbItems" :value="item.value">{{ item.label }}</option>
            </select>
        </div>
    </div>

    <div class="flex-1 bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col overflow-hidden relative">
        <div class="px-4 py-2 bg-gray-50 border-b border-gray-200 text-xs text-gray-400 flex justify-between items-center">
            <span>{{ kbType === 'characters' ? '角色卡编辑器' : (kbType === 'outlines' ? '大纲编辑器' : '设定表单编辑器') }} (Markdown支持)</span>
            <button @click="saveKbContent" :disabled="!kbSelectedFile" class="text-blue-600 hover:text-blue-800 disabled:opacity-50">
                <i class="fa-solid fa-save"></i> 覆写落盘
            </button>
        </div>
        <textarea v-model="kbContent" class="flex-1 w-full p-4 resize-none outline-none text-sm text-gray-700 bg-transparent font-mono" placeholder="请选择设定文件进行可视化修改..."></textarea>
    </div>
</div>
