<div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
    <h3 class="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-rocket text-green-500"></i> 小说创作工程 (novel_projects)</h3>
    
    <div class="mb-4 p-3 bg-gray-50 border border-gray-200 rounded">
        <h4 class="text-xs font-bold text-gray-600 mb-2">1. 工程初始化 / 覆盖已存在项目</h4>
        
        <div class="flex gap-4 mb-3 border-b border-gray-200 pb-2">
            <label class="flex items-center gap-1 text-sm cursor-pointer"><input type="radio" v-model="projectActionMode" value="create" class="text-green-600 focus:ring-green-500"> 创建新工程</label>
            <label class="flex items-center gap-1 text-sm cursor-pointer"><input type="radio" v-model="projectActionMode" value="overwrite" class="text-green-600 focus:ring-green-500"> 覆盖现有工程</label>
        </div>

        <div class="mb-2">
            <input v-if="projectActionMode === 'create'" type="text" v-model="newProjectName" placeholder="输入新小说书名..." class="w-full text-sm border border-gray-300 rounded p-2 focus:ring-1 focus:ring-green-500 outline-none">
            
            <select v-if="projectActionMode === 'overwrite'" v-model="existingProjectSelect" class="w-full text-sm border border-gray-300 rounded p-2 bg-white outline-none">
                <option value="">-- 选择需覆盖的小说 --</option>
                <option v-for="p in projects" :value="p">{{ p }}</option>
            </select>
        </div>
        
        <div class="flex gap-4 mb-2">
            <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="newProjectBranch" value="原创"> 原创</label>
            <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="newProjectBranch" value="同人"> 同人</label>
            <label class="flex items-center gap-1 text-sm"><input type="radio" v-model="newProjectBranch" value="默认"> 默认</label>
        </div>
        
        <div v-if="newProjectBranch !== '默认'">
            <select v-model="newProjectReferenceStyle" class="w-full text-sm border border-gray-300 rounded p-2 mb-2 bg-white outline-none">
                <option value="">-- 选择对应的 text_style_imitation 参考数据 --</option>
                <option v-for="style in availableStyles" :value="style">{{ style }}</option>
            </select>
        </div>

        <button v-if="projectActionMode === 'create'" @click="createProject" :disabled="!newProjectName.trim() || (newProjectBranch !== '默认' && !newProjectReferenceStyle)" class="w-full py-2 bg-green-500 hover:bg-green-600 disabled:opacity-50 text-white text-sm font-bold rounded shadow-sm transition-colors">
            创建工程 ({{ newProjectBranch }})
        </button>
        <button v-if="projectActionMode === 'overwrite'" @click="createProject" :disabled="!existingProjectSelect || (newProjectBranch !== '默认' && !newProjectReferenceStyle)" class="w-full py-2 bg-red-500 hover:bg-red-600 disabled:opacity-50 text-white text-sm font-bold rounded shadow-sm transition-colors">
            覆盖工程 ({{ newProjectBranch }})
        </button>
    </div>

    <div class="p-3 border border-gray-200 rounded">
        <h4 class="text-xs font-bold text-gray-600 mb-2">2. 执行创作与辅助功能 (针对当前选中项目)</h4>
        <p class="text-xs text-gray-400 mb-2">当前选中的项目：<span class="font-bold text-blue-600">{{ currentProject || '未选择' }}</span></p>
        
        <label class="text-xs text-gray-500 block mb-1">执行脚本类型</label>
        <select v-model="workflowProjectScript" class="w-full text-sm border border-gray-300 rounded p-2 mb-3 bg-gray-50 outline-none">
            <option value="f4a">f4a - 设定补全 (世界观/角色)</option>
            <option value="f5a">f5a - 章节大纲生成</option>
            <option value="f5b">f5b - 小说正文生成</option>
            <option value="f6">f6 - 剧情方向推演</option>
            <option value="f7">f7 - 文本多维度校验</option>
        </select>

        <div class="mb-3">
            <label class="text-xs text-gray-500 block mb-1">选择推理模型</label>
            <select v-model="workflowProjectModel" class="w-full text-sm border border-gray-300 rounded p-2 bg-gray-50 outline-none">
                <option value="deepseek-chat">DeepSeek-V3 (标准模型)</option>
                <option value="deepseek-reasoner">DeepSeek-R1 (深度推理)</option>
            </select>
        </div>

        <div v-if="workflowProjectScript === 'f4a'" class="mb-3">
            <label class="text-xs text-gray-500 block mb-1">补全模式</label>
            <select v-model="workflowF4aMode" class="w-full text-sm border border-gray-300 rounded p-2 mb-2 bg-gray-50 outline-none">
                <option value="worldview">世界观补全 (worldview)</option>
                <option value="character">角色卡补全 (character)</option>
            </select>
            
            <div v-if="workflowF4aMode === 'worldview'" class="space-y-2">
                <div>
                    <label class="text-xs text-gray-500 block mb-1 font-bold">核心世界观 (Worldview) <span class="text-red-500">*</span></label>
                    <textarea v-model="f4aWorldview.worldview" placeholder="描述世界的基本规则、背景..." class="w-full text-sm border border-gray-300 rounded p-2 h-20 outline-none"></textarea>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1 font-bold">力量体系 (Power System) <span class="text-red-500">*</span></label>
                    <input type="text" v-model="f4aWorldview.power_system" placeholder="例如：炼气、筑基..." class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">小说类型 (Type)</label>
                        <input type="text" v-model="f4aWorldview.type" placeholder="玄幻/都市/..." class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">女主数量 (Heroines)</label>
                        <input type="text" v-model="f4aWorldview.heroines" placeholder="单女主/多女主/无CP" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs text-gray-500 block mb-1">金手指/核心爽点 (Cheat)</label>
                    <input type="text" v-model="f4aWorldview.cheat" placeholder="系统/老爷爷/重生..." class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">主要势力 (Factions)</label>
                        <input type="text" v-model="f4aWorldview.factions" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">核心资源 (Resources)</label>
                        <input type="text" v-model="f4aWorldview.resources" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs text-gray-500 block mb-1">历史/传说 (History)</label>
                    <textarea v-model="f4aWorldview.history" class="w-full text-sm border border-gray-300 rounded p-2 h-16 outline-none"></textarea>
                </div>
                
                <div>
                    <label class="text-xs text-gray-500 block mb-1">出场角色 (Characters)</label>
                    <input type="text" v-model="f4aWorldview.characters" placeholder="简单列举关键人物..." class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>
                
                <div>
                    <label class="text-xs text-gray-500 block mb-1">其他补充 (Others)</label>
                    <input type="text" v-model="f4aWorldview.others" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>
            </div>
            
            <div v-else class="space-y-2">
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 block mb-1 font-bold">角色名 <span class="text-red-500">*</span></label>
                        <input type="text" v-model="f4aChar.name" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                    <div class="w-1/3">
                        <label class="text-xs text-gray-500 block mb-1 font-bold">类型 <span class="text-red-500">*</span></label>
                        <select v-model="f4aChar.char_type" class="w-full text-sm border border-gray-300 rounded p-2 bg-white outline-none">
                            <option value="男主角">男主角</option>
                            <option value="女主角">女主角</option>
                            <option value="配角">配角</option>
                            <option value="反派">反派</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="text-xs text-gray-500 block mb-1 font-bold">人物塑造 (Shape) <span class="text-red-500">*</span></label>
                    <select v-model="f4aChar.char_shape" class="w-full text-sm border border-gray-300 rounded p-2 bg-white outline-none">
                        <option value="圆形人物">圆形人物 (复杂多面)</option>
                        <option value="扁平人物">扁平人物 (单一特征)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">身份 (Identity)</label>
                        <input type="text" v-model="f4aChar.identity" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">性格 (Personality)</label>
                        <input type="text" v-model="f4aChar.personality" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs text-gray-500 block mb-1">外貌 (Appearance)</label>
                    <input type="text" v-model="f4aChar.appearance" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>
                
                <div>
                    <label class="text-xs text-gray-500 block mb-1">能力/境界 (Ability)</label>
                    <input type="text" v-model="f4aChar.ability" class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>

                <div>
                    <label class="text-xs text-gray-500 block mb-1">经历 (Experience)</label>
                    <textarea v-model="f4aChar.experience" class="w-full text-sm border border-gray-300 rounded p-2 h-16 outline-none"></textarea>
                </div>

                <div>
                    <label class="text-xs text-gray-500 block mb-1">对主角态度 (Attitude)</label>
                    <input type="text" v-model="f4aChar.attitude" placeholder="如：爱慕、敌视、利用..." class="w-full text-sm border border-gray-300 rounded p-2 outline-none">
                </div>
            </div>
        </div>

        <div v-if="['f5a', 'f5b', 'f7'].includes(workflowProjectScript)" class="mb-3"> 
            <label class="text-xs text-gray-500 block mb-1">目标章节名</label> 
            <div class="flex gap-2"> 
                <select v-model="workflowChapterSelect" @change="workflowChapterName = workflowChapterSelect" class="w-1/3 text-sm border border-gray-300 rounded p-2 bg-gray-50 outline-none"> 
                    <option value="">-- 选择现有章节 --</option> 
                    <option v-for="chap in chapters" :value="chap.replace('.txt', '')">{{ chap.replace('.txt', '') }}</option> 
                </select> 
                <input type="text" v-model="workflowChapterName" placeholder="例如：第一章" class="flex-1 text-sm border border-gray-300 rounded p-2 focus:ring-1 focus:ring-blue-500 outline-none"> 
                <button @click="openCreateModal" class="px-3 py-1 bg-blue-50 text-blue-600 border border-blue-200 rounded text-sm hover:bg-blue-100 transition-colors shrink-0 shadow-sm" title="在底层物理创建此章节"> 
                    <i class="fa-solid fa-file-circle-plus"></i> 预建 
                </button> 
            </div> 
        </div> 

        <div v-if="workflowProjectScript === 'f5a'" class="mb-3">
            <label class="text-xs text-gray-500 block mb-1">章节简述 (剧情概要)</label>
            <textarea v-model="workflowChapterBrief" placeholder="输入本章发生的核心事件..." class="w-full text-sm border border-gray-300 rounded p-2 h-20 outline-none focus:ring-1 focus:ring-blue-500"></textarea>
        </div>

        <button @click="runProjectScript" :disabled="!currentProject" class="w-full py-2 bg-green-50 hover:bg-green-100 text-green-700 disabled:opacity-50 text-sm font-medium rounded transition-colors border border-green-200">
            执行创作脚本
        </button>
    </div>
</div>
