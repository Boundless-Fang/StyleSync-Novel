<div v-if="showChapterModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 transition-opacity"> 
    <div class="bg-white p-6 rounded-xl shadow-2xl w-96 border border-gray-100"> 
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"> 
            <i class="fa-solid fa-file-circle-plus text-blue-500"></i> 新建章节 
        </h3> 
        
        <div class="mb-4"> 
            <label class="block text-sm font-bold text-gray-700 mb-1">章节序号 (第 N 章)</label> 
            <div class="flex items-center gap-2"> 
                <span class="text-gray-500 font-medium">第</span> 
                <input type="number" v-model="newChapterNum" min="1" class="flex-1 border border-gray-300 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500 text-center font-bold text-blue-600"> 
                <span class="text-gray-500 font-medium">章</span> 
            </div> 
        </div> 
        
        <div class="mb-6"> 
            <label class="block text-sm font-bold text-gray-700 mb-1">章节名 <span class="text-gray-400 font-normal text-xs">(选填，不影响代码逻辑)</span></label> 
            <input type="text" v-model="newChapterTitle" placeholder="例如：大战黑水玄蛇" @keydown.enter="confirmCreateChapter" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"> 
        </div> 
        
        <div class="flex justify-end gap-3"> 
            <button @click="showChapterModal = false" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">取消</button> 
            <button @click="confirmCreateChapter" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-md">确认创建</button> 
        </div> 
    </div> 
</div>
